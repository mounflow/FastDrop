name: fastdrop_mobile
description: FastDrop LAN file transfer app - Android client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.0
  http: ^1.2.0
  mobile_scanner: ^6.0.0
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  crypto: ^3.0.0
  shared_preferences: ^2.3.0
  qr_flutter: ^4.1.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
